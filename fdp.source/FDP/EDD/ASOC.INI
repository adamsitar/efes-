;---------------
; ASSOC
;˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙

  ADR IN HEADER  = no              ; enabled -> za identifikator typu spravy vlozi THIS NODE/REMOTE NODE+CISLO SPRAVY

  ITA-2 ASCII    = yes             ; enabled -> koduje ICAO spravy v cistom textovom formate bez ITA2 oddelovacov a novych riadkov
  ITA-2 BIN      = no              ; enabled -> koduje ITA-2 spravu do binarnej podoby - inverzneho patbitoveho kodu
; BITS           = 5               ; pocet bitov v binarnej vystupnej sprave



;---------------
; ADRESY
;˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙

  FIR            = LKPR            ; udaje do hlavicky spravy
  THIS NODE      = xx
  REMOTE NODE    = xx

  INPUT ADDRESS  = LKxxxxxx        ; ICAO adresa tejto stanice
  OUTPUT ADDRESS = LKxxxxxx        ; ICAO adresa prijimajucej stanice

  INPUT CHANNEL  = xxx             ; vstupny kanal
  OUTPUT CHANNEL = xxx             ; vystupny kanal


