{ ---------------------------------------------
  Nacitanie oblasti riadenia
  ---------------------------------------------
}

 procedure ine_LK_m(s: string; var ine: TOBine); far;
     var   t,u,l : string;
           i : int;
     begin
       fillchar(ine,sizeof(ine),0);
       l:= s; s:= l4str(s);
       ine.icao_kod := cut_(getstr(s,2,[icao_NXIT]));

       t:= getstr(s,pos_ine,odd_body);
       i:= 0; ine.podriadene:= false;
       while (not ine.podriadene) and (i<getstritems(t,[icao_NXIT])) do        begin
           u:= uni_str(getstr (t,i+1,[icao_NXIT]));
           if (u<>'') and (u[1]=przn_nadriadene_letisko) then
              begin
                u:= copy(u,2,length(u)-1);
                ine.podriadene:= (u<>'') and toto_letisko(u)
              end;
           inc(i)
         end;

       {t:= getstr(s,pos_sector,odd_body);
       ine^.sector:= TPFunc_s(p_nacitanie_oblasti_riadenia)(t);}

       {$IFDEF AIRBASE} if ine.podriadene then {$ENDIF} zapis_text_do_subora(pathDATA+strpas(fn_13aM.fn),l);
       zapis_text_do_subora(pathDATA+strpas(fn_16aM.fn),l);
     end;


 function comp_LK_m(LK_m: PaBody; i,j: int): bool; far;
    var   B1,B2: TsBod;
          is1,is2: bool;
    begin
      LK_m^.read(i,B1); LK_m^.read(j,B2);
      is1:= B1.typ=sym_MLet; is2:= B2.typ=sym_MLet;
      if (is1 and is2) then comp_LK_m:= B1.kod<B2.kod
      else comp_LK_m:= is1 and (not is2)
    end;

 procedure swap_LK_m(LK_m: PaBODy; i,j: int); far;
     var   B1,B2: TsBod;
           is1,is2: bool;
     begin
       LK_m^.read(i,B1); LK_m^.read(j,B2);
       LK_m^.write(i,B2); LK_m^.write(j,B1);
     end;

 function zotriedenie_LK_m(_err: bool): bool;
    var   Bi : TsBod;
          i  : int;
          nl : bool;
    begin
      zotriedenie_LK_m:= false;
      if (LK_m=nil) or (LK_m^.pocet=0) then Exit;
      zotriedenie_LK_m:= QuickSort_Arr(LK_m,@comp_LK_m,@swap_LK_m, 0,LK_m^.pocet-1, false);

      i:= 0; while i<LK_m^.pocet do
        begin
          LK_m^.read(i,Bi);
          if Bi.typ=sym_MLet then inc(i)
          else break
        end;

      LK_m^.read(0,Bi);
      if not ((LK_m^.pocet=0) and (i=0) and (Bi.typ<>sym_MLet)) then poc_AIRBASE:= i;

      if poc_AIRBASE>max_AIRBASE then
         begin
           poc_AIRBASE:= max_AIRBASE-1;
           error_max (err_B_vela_letisk,strpas(fn_13aM.fn),poc_AIRBASE,max_AIRBASE,nl)
         end;

      {$IFDEF AIRBASE}
        i:= _LKmind (this_airbase);
        if i<>-1 then pos_AIRBASE:= i
        else pos_AIRBASE:= high(pos_AIRBASE);
      {$ENDIF}
    end;


