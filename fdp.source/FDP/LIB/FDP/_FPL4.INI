 procedure initializacia;
     begin
       write('Initialize FPL4... ');

       _FPL4_PPL_ENABLE := read_cfg_bool(SYSTEMcfg,cfg_FPL4_PPL_ENABLE, _FPL4_PPL_ENABLE);
       _FPL4_CPL_ENABLE := read_cfg_bool(SYSTEMcfg,cfg_FPL4_CPL_ENABLE, _FPL4_CPL_ENABLE);
       _FPL4_MZP_ENABLE := read_cfg_bool(SYSTEMcfg,cfg_FPL4_MZP_ENABLE,   _FPL4_MZP_ENABLE);

       dT_preactive_FPL4 := read_cfg_word(SYSTEMcfg,cfg_dT_preactive_FPL4,  dT_preactive_FPL4);
       dT_propose_FPL4   := read_cfg_word(SYSTEMcfg,cfg_dT_propose_FPL4,    dT_propose_FPL4);
       dT_coordinate_FPL4:= read_cfg_word(SYSTEMcfg,cfg_dT_coordinate_FPL4, dT_coordinate_FPL4);
       dT_unactive_FPL4  := read_cfg_word(SYSTEMcfg,cfg_dT_unactive_FPL4,   dT_unactive_FPL4);
       {dT_deactive_FPL4  := read_cfg_word(SYSTEMcfg,cfg_dT_deactive_FPL4,   dT_deactive_FPL4);}

       {kontrola_archivu;}

       {p_add_FPL4  := _add_FPL4;
       p_add_FDR   := _add_FDR;
       p_form_FPL4 := nil;
       }
       writeln('Done.')
     end;
