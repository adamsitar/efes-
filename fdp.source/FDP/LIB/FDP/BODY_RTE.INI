 function get_items_RTE (fn: string;
                         top,max: int;
                         var _err: bool
                        ): word;
    var   f : text;
          s : string;
          nl : bool;
    begin
      if Exists(fn)=0 then
         begin
           Assign(f,fn); Reset(f);
           while (not Eof(f)) do
             begin
               if    (not read_line (f,s,['"',';'],true))
                  or (s='')
                  or (s[1] in [odd_rtem_item,odd_rtem_subitem])
                  then continue;
               if (top>=max) then
                  begin
                    {MessError(kbNL+fn+': to many routes.',true,_err);}
                    error_max (err_B_vela_trati,fn,top+1,max,nl);
                    break
                  end;
               inc(top)
             end;
           Close(f)
         end;
      get_items_RTE:= top;
    end;


 procedure read_RTEs (fn: string;  T: PRTEs; _0,_top: int; check_en,allpoints: bool {; p_ine: PProc_s});
     var   f,f2 : text;
           s,u  : string;
           i,j  : int;
           Bi   : TsBod;
           B    : TOBxy;
     begin
       if Exists(fn)<>0 then Exit;

       Assign(f,fn); Reset(f);
       i:= _0;
       while (i<_top) and (not Eof(f)) do
         begin
           if not read_line (f,s,['"',';'],true) then continue;
           s:= l4str(s);

          { kod trate
          }
           u:= getstr(s,pos_rtem,[odd_rtem_item]);
           T^[i].kod:= cut_(getstr(u,pos_rtem_kod_,[odd_rtem_subitem]));
           T^[i].kodp:= cut_(getstr(u,pos_rtem_kodp_,[odd_rtem_subitem]));
           if (u='') or (u[1] in [odd_rtem_item,odd_rtem_subitem]) or (T^[i].kod='') then continue;

          { nacitanie bodov trate a ich parametrov
          }
           u:= getstr(u,pos_rtem_bod_,[odd_rtem_subitem]);
           T^[i].top:= minimum(getstritems(u,[odd_rtem_subitems]),max_BODy)-1;
           GetMem(T^[i].rte,(T^[i].top+1)*sizeof(TRTE_BOD));
           FillChar(T^[i].rte^,(T^[i].top+1)*sizeof(TRTE_BOD),0);
           for j:= 0 to T^[i].top do
             begin
               T^[i].rte^[j].kod:= cut_(getstr(u,j+1,[odd_rtem_subitems]));
               if check_en then
                  if    (OB^._OBind(T^[i].rte^[j].kod,Bi)>=0)
                     or (allpoints and (get_OB_XYM (T^[i].rte^[j].kod,B)))
                     then
                     else RunError(kbNL+fn+' -> unknown point '+T^[i].rte^[j].kod+' of the route '+T^[i].kod+'.')
             end;
           inc(i);

          { aktualizacia subora pre ponuku - usporiadanie trati tak,
            - aby najprv boli uvedene spolocne trate
            - potom vlastne trate
            - nakoniec trate ostatnych letisk
          }
          (*
           s:= pathLST+strpas(fnRTE_Mlst.fn);
           if (FExists(s)<>0) or (_GetFTime(s)<>_GetFTime(pathLST+strpas(fnRTE_M.fn))) then
              begin
               {$IFDEF AIRBASE}
                Reset(f);
                Assign(f2,s);

                readln(f,s);
                u:= cut_(s);
                if u=''()

                u[1] in [';','~','"']+skip))
               {$ELSE}
                 CopyFile(pathLST+strpas(fnRTE_M.fn),s)
               {$ENDIF}
              end
           *)
         end;
       Close(f);
     end;

 function vlastna_trat (s: string): bool;
    var   i : int;
    begin
     {$IFDEF AIRBASE}
      s:= uni_str(getstr (s,2,[';']));
      i:= pos(przn_nadriadene_letisko,s);
      if i>0 then s:= getstr(copy(s,i+1,length(s)-i),1,[' ',',']) else s:= '';
      vlastna_trat:= (s='') or toto_letisko(s) or podriadene_letisko(s)
     {$ELSE}
      vlastna_trat:= true
     {$ENDIF}
    end;

