

{ ---------------------------------------------
  Nacitanie vojenskych trati LPS
  ---------------------------------------------
}
 function get_items_AREA (fn: string;
                          items: word; skip: TCharSet;
                          top,max: word;
                          err: bool;
                          var _err: bool
                         ): word;
    var   f : text;
          s : string;
          i,j,res : int;
          sir,dlz : string[10];

    begin
      if Exists(fn)=0 then
         begin
           Assign(f,fn); Reset(f); i:= 0;
           while not Eof(f) do
             begin
               if (not read_line (f,s,skip,true)) or (getstritems(s,[odd_AREA_item]) < items) then continue;
               inc(i)
             end;
           res:= Minimum(top+i,max);
           ResetIOError;
           Close(f);
           if err and (top+i>max) then {MessError(kbNL+'To many items in '+fn+'.',true,_err)}
                                       error_max ('',fn,top+i,max,_err);

         end
      else res:= top;
      get_items_AREA:= res;
      ResetIOError
    end;


 procedure read_AREA(fn: string;  
                     items: word; skip: TCharSet;
                     A: PaArea; _0,_top: int;
                     {; p_ine: PProc_s}
                     _check: bool;
                     _make_arr: bool;
                     _make_lst: bool
                    );

     var   f,f2,fl : text;
           s,u  : string;
           i,j  : int;
           v  : word;
           v_ : char;
           B  : TOBxy;
           Ai : TpArea;

     function vys(s: string): word;
        begin
          vys:= 0;
          if decode_l4_vyss (s, v,v_,nil) then vys:= get_altM(v_,v) div m_S
          else if _check then RunError(l4_errs(a_L4,s,err_l4444_vyska_chyba))
        end;

     begin
       if Exists(fn)<>0 then Exit;

       if _make_lst then
          begin
            vytvor_novy_subor(pathDATA+strpas(fnAREA.fn));
            Assign(fl,pathDATA+strpas(fnAREA.fn)); Append(fl);
          end;

       Assign(f,fn); Reset(f);
       i:= _0; while ((not _make_arr) or (i<_top)) and (not Eof(f)) do
         begin
           if    (not read_line (f,s,skip,true))
              or (_make_arr and (getstritems(s,[odd_AREA_item]) < items))
              or ((not _make_arr) and ((cut_(s)='') or (cut_(s)=';')))
                 then continue;

           s:= mtks_rus_to_lat(uni_str(s));
           fillchar(Ai,sizeof(Ai),0);

           Ai.kod := _unique_area_code(cut_(getstr(s,pos_AREA_kod, [odd_AREA_item])));

           if _make_arr then
              begin
                u:= cut_(getstr(s,pos_AREA_fl, [odd_AREA_item]));
                if u<>'' then
                   begin
                     Ai.vys1:= vys(getstr(u,1,[icao_ARR,icao_NXT]));
                     Ai.vys2:= vys(getstr(u,2,[icao_ARR,icao_NXT]));
                   end;

                Ai.bodi:= cut_(getstr(s,pos_AREA_bodi,[odd_AREA_item]));
                Ai.bodc:= cut_(getstr(s,pos_AREA_bodc,[odd_AREA_item]));

                if cut_(Ai.bodc)='' then RunError(l4_errs(a_FUA,Ai.bodc,err_AREA_vztazny_bod))
                else if not get_OB_XYM(Ai.bodc,B) then RunError(l4_errs(a_OPL,Ai.bodc,err_BOD_neznamy));

                A^.add(Ai);
              end;
           inc(i);

           if _make_lst then writeln(fl,Ai.kod);
         end;
       Close(f);

       if _make_lst then
          begin
            writeln(fl,'');
            Close(fl);
          end;
     end;
