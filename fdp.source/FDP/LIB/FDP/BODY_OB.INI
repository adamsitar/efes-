{ ---------------------------------------------
  Nacitanie bodov (letisk, orientacnych bodov)
  ---------------------------------------------
}
 function get_items_OB (fn: string;
                        top,max: int;
                        skip: TCharSet;
                        err: bool;
                        var _err: bool
                       ): word;
    var   f : text;
          s : string;
          i,j,res : int;
          sir,dlz : string[10];
    begin
      if Exists(fn)=0 then
         begin
           Assign(f,fn); Reset(f); i:= 0;
           while not Eof(f) do
             begin
               if not read_line (f,s,skip,true) then continue;
               if upstring(GetStr(s,pos_kod,odd_body+[icao_NXIT]))=ZZZZ then continue;
               inc(i)
             end;
           res:= Minimum(top+i,max);
           ResetIOError;
           Close(f);
           if err and (top+i>max) then error_max ('',fn,top+i,max, _err)
         end
      else res:= top;
      get_items_OB:= res;
      ResetIOError
    end;


 procedure read_OBs (fn: string;
                     B: PaBody; _0,_top: int;
                     p_ine: PP_init_OBine;
                     _exit: bool;
                     var _err : bool
                    );

     var   f       : text;
           r       : real;
           j,c,k   : int;
           l       : word;
           s,u     : string;
           s1,s2,
           sir,dlz : string[10];
           bres    : bool;
           Bi      : TsBod;
     begin
       if Exists(fn)<>0 then Exit;
       {gotoxy(1,25); write('Initializing '+fn+'...');}

       Assign(f,fn); Reset(f); j:= _0; l:= 0;
       while (j<_top) and (not Eof(f)) do
         begin
           bres:= read_line (f,s,['"',';'],true);
           inc(l);
           if not bres then continue;
           u:= s; s:= uni_str(mtks_rus_to_lat(s));

           fillchar(Bi,sizeof(Bi),0);

          { kod bodu
          }
           Bi.kod := upstring(GetStr(s,pos_kod,odd_body+[icao_NXIT]));
           if Bi.kod=ZZZZ then continue;

          { suradnice
          }
           if     (not ZemSurToReal(uni_str(getstr(s,pos_zs,odd_body)), Bi.x,Bi.y))
              or  ((Bi.kod='') or (Bi.x=0) or (Bi.y=0)) then
                 if _exit then RunError(kbNL+fn+' -> invalid data ('+s+') in line '+cstr(l,1)+'.');

          { typ bodu
          }
           Bi.typ := get_OBtyp(getstr(s,pos_typ,odd_body));

          { ine - cez ext fciu, zatial vyuzivaju len vojenske letiska
                  v OPL, preto staci jednoduchy popis podriadenosti 0-1,
                  pri inom pouziti by to bol smernik na zoznam vlastnosti...
                  naplna sa externou fciu
          }
           if p_ine<>nil then TP_init_OBine(p_ine)(u, Bi.ine);


          { najdenie maximalnych rozmerov plochy,
            pre neskorsiu kontrolu pretecenia suradnic...
          }
           if zd_max<Bi.x then zd_max:= Bi.x;
           if (zd_min=0) or (Bi.x<zd_min) then zd_min:= Bi.x;

           if zs_max<Bi.y then zs_max:= Bi.y;
           if (zs_min=0) or (Bi.y<zs_min) then zs_min:= Bi.y;

           B^.add(Bi);
           inc(j)
         end;
       {gotoxy(1,25); write('             '+ReplChar(fn,[#1..#255],' ')+'   ');}
       ResetIOError;
       Close(f)
     end;


 procedure done_OBs (var B: PABody; p_ine: PP_done_OBine);
     var   Bi : TsBod;
           i  : int;
     begin
       if B=nil then Exit;

       if p_ine<>nil then for i:= 0 to B^.pocet do
          begin
            B^.read(i,Bi);
            TP_done_OBine(p_ine)(Bi.ine);
            B^.write(i,Bi);
          end;

       (*if size_ine>0 then for i:= 0 to pocet-1 do if B^[i].ine<>nil then
          begin
            {if B^[i].ine^.sector<>nil then p_odalokovanie_oblasti_riadenia(B^[i].ine^.sector);}
            freemem(B^[i].ine,size_ine);
          end;*)

       Dispose(B,Done);
       B:= nil;
     end;


{ ---------------------------------------------
  Nacitanie vstupnych bodov
  ---------------------------------------------
}
 {
   format BOD "(" -> zaciatok trate
              ")" -> koniec trate
 }
 const odd_rte_ob = [';','/',':'];

 procedure read_OBs_io(fn: string; B: PIOBODy;
                       _0,_top: int;
                       var _err: bool
                      );

     var   f : text;
           s,t : string;
           i,j,k : int;
           dep0,dep : string;
           bod  : TOBxy;

     begin
       if Exists(fn)<>0 then Exit;
       {gotoxy(1,25); write('Initializing '+fn+'...');}

       Assign(f,fn); Reset(f); i:= _0;
       while (i<_top) and (not Eof(f)) do
         begin
           if not read_line (f,s,['"',';','('],true) then continue;
           s:= mtks_rus_to_lat(uni_str(s));

           FillChar(B^[i],sizeof(B^[i]),0);
           B^[i].kod:= cut_(getstr(s,1,[' ','(',';']));
           {if not get_BOD_XY(B^[i].kod, bod) then RunError(kbNL+'Point '+cut_(getstr(s,1,[';']))+' is unknown.');}
           dep0:= cut_(getstr(s,2,[';']));
           dep:= '';
           for j:= 1 to getstritems(dep0,[' ',',']) do
             begin
               t:= getstr(dep0,j,[' ',',']);
               k:= 0; while (k<i) and (t<>B^[k].kod) do inc(k);
               if (k<i) and (t=B^[k].kod) and (B^[k].io<>nil) then dep:= dep+strpas(B^[k].io)
               else begin
                      if get_OB_XY(t, bod) then
                              MessError(kbNL+fn+
                                        ' -> I/O direction related to the point ['+B^[i].kod+'->]'+t+' is unknown.',
                                        true,_err
                                       );
                      dep:= dep+t;
                    end;
               dep:= dep+' '
             end;
           B^[i].io:= strpasnew(cut_(dep));
           B^[i].pozn:= strpasnew(cut_(getstr(s,3,[';'])));
           inc(i)
         end;
       {gotoxy(1,25); write('             '+ReplChar(fn,[#1..#255],' ')+'   ');}
       ResetIOError;
       Close(f)
     end;
