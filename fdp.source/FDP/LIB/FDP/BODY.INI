 var SaveExit : pointer;

 procedure BODY_done;
     var   i: int;
     begin
       ExitProc:= SaveExit;

     { Priestory
     }
       if AREA<>nil then Dispose(AREA,Done); AREA:= nil;


     { Trate
     }
       {IFDEF FPL4}
        if OB_io<>nil then
           begin
             for i:= 0 to OBs_io-1 do
                 begin
                   strdispose(OB_io^[i].io);
                   strdispose(OB_io^[i].pozn)
                 end;
             FreeMem(OB_io, SizeOf(TIOBOD)*(OBs_io))
           end;

        {if RTE_O<>nil then
           begin
             for i:= 0 to RTEs_O-1 do disp_RTE(RTE_O^[i]);
             FreeMem(RTE_O, SizeOf(TRTE)*(RTEs_O));
           end;}

        if RTE<>nil then
           begin
             for i:= 0 to RTEs-1 do disp_RTE(RTE^[i]);
             FreeMem(RTE, SizeOf(TRTE)*(RTEs));
           end;
       {ENDIF}

       {IFDEF FPL0}
        if RTE_m<>nil then
          begin
            for i:= 0 to RTEs_m-1 do disp_RTE(RTE_m^[i]);
            FreeMem(RTE_m, SizeOf(TRTE)*(RTEs_m));
          end;
       {ENDIF}


     { Body
     }
       done_OBs(OB_m,nil);
       done_OBs(OB,nil);
       done_OBs(LK_m,nil);
       done_OBs(LK,nil);


     { Zoznamy - nazvy
     }
       if fnABC.fn<>nil then StrDispose(fnABC.fn);
     end;


 procedure BODY_init_(var _err: bool);

     var   bodov, _1,_2,_3,_4,_5, _1ob, i,j: int;
           bod : TsBod;
           bres : bool;

           f : text;

     begin
       SaveExit:= ExitProc;
       ExitProc:= @BODY_done;


      { ==============================
         kontrola pritomnosti suborov
        ------------------------------
      }
       check_files (pathDATA+strpas(fnNDB.fn),  err_UNREG_PRG,false);
       check_files (pathDATA+strpas(fnOB.fn),   err_UNREG_PRG,false);
       check_files (pathDATA+strpas(fnCLet.fn), err_UNREG_PRG,false);
       check_files (pathDATA+strpas(fnMLet.fn), err_UNREG_PRG,false);

       {$IFDEF FPL4_ACT}
        check_files (pathDATA+strpas(fnRTE.fn), err_UNREG_PRG,false);
        check_files (pathDATA+_fnNDB_I+firExt,  err_UNREG_PRG,false);
       {$ENDIF}


      { ==============================
         nacitanie bodov
        ------------------------------
      }

      { ˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙
         civilne letiska
        ˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙
      } bodov := get_items_OB(pathDATA+strpas(fnCLet.fn), 0,maxLKs, [';'],true,_err);
        LK    := New(PaBody,Init(bodov,sizeof(TsBod),true));
        if bodov>0 then
           begin
             read_OBs(pathDATA+strpas(fnCLet.fn), LK,0,bodov, @ine_OB_c,true,_err)
           end;

      { ˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙
         vojenske a ine letiska
        ˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙
      } _1    := get_items_OB(pathDATA+strpas(fnMLet.fn), 0,maxLKs, [';'], true,_err);
        bodov := get_items_OB(pathDATA+strpas(fnALet.fn),_1,maxLKs, [';'], true,_err);
        LK_m  := New(PaBody,Init(bodov,sizeof(TsBod),true));
        if bodov<>0 then
           begin
             IO.Del (pathDATA+strpas(fn_13aM.fn));
             IO.Del (pathDATA+strpas(fn_16aM.fn));
             read_OBs (pathDATA+strpas(fnMLet.fn), LK_m,  0,_1,    @ine_LK_m, true,_err);
             read_OBs (pathDATA+strpas(fnALet.fn), LK_m, _1,bodov, @ine_LK_m, true,_err);
             zotriedenie_LK_m(_err);
           end;

      { ˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙
         orientacne body trati LPS
        ˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙
      } _1    := get_items_OB (pathDATA+strpas(fnNDB.fn),  0,maxOBs, [';'], true,_err);
        bodov := get_items_OB (pathDATA+strpas(fnCLet.fn),_1,maxOBs, [';'], true,_err);
        OB    := New(PaBody,Init(bodov,sizeof(TsBod),true));
        if bodov<>0 then
           begin
             read_OBs (pathDATA+strpas(fnNDB.fn),  OB, 0,_1,     @ine_OB_c, true,_err);
             read_OBs (pathDATA+strpas(fnCLet.fn), OB, _1,bodov, @ine_OB_c, true,_err)
           end;

      { ˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙
         vojenske orientacne body
        ˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙
      } _1    := get_items_OB (pathDATA+strpas(fnOB.fn),    0,maxOBs, [';'], true,_err);
        _2    := get_items_OB (pathDATA+strpas(fnMLet.fn), _1,maxOBs, [';'], true,_err);
        bodov := get_items_OB (pathDATA+strpas(fnALet.fn), _2,maxOBs, [';'], true,_err);
        OB_m  := New(PaBody,Init(bodov,sizeof(TsBod),true));
        if bodov<>0 then
           begin
             read_OBs (pathDATA+strpas(fnOB.fn),   OB_m,   0,_1,    nil, true,_err);
             read_OBs (pathDATA+strpas(fnMLet.fn), OB_m,  _1,_2,    nil, true,_err);
             read_OBs (pathDATA+strpas(fnALet.fn), OB_m,  _2,bodov, nil, true,_err);
           end;


      { ==============================
         nacitanie trati
        ------------------------------

        Trate si pocas nacitavania kontroluju, ci poznaju vsetky
        body v nich uvedene, t.j. v tom case su uz nacitane v OB
      }

      { ˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙
         trate LPS
        ˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙
      }
       {$IFDEF FPL4_ACT}
        RTEs := get_items_RTE (pathDATA+strpas(fnRTE.fn),0 ,maxRTEs,_err);
        if RTEs<>0 then
           begin
             GetMem(RTE, SizeOf(TRTE)*(RTEs));
             FillChar(RTE^, SizeOf(TRTE)*(RTEs),0);
             read_RTEs(pathDATA+strpas(fnRTE.fn), RTE,0,RTEs,true,false);
           end;

        {RTEs_O:= get_items_RTE(pathDATA+strpas(fnRTE_O.fn),0,maxRTEs);
        if RTEs_O<>0 then
           begin
             GetMem(RTE_O, SizeOf(TRTE)*(RTEs_O));
             FillChar(RTE_O^, SizeOf(TRTE)*(RTEs_O),0);
             read_RTEs(pathDATA+strpas(fnRTE_O.fn), RTE_O,  0,RTEs_O, true)
           end;}

        OBs_io:= get_items_OB(pathDATA+_fnNDB_I+firExt, 0,maxOBs, [';','(','"'], true,_err);
        if OBs_io<>0 then
           begin
             GetMem(OB_io, SizeOf(TIOBOD)*(OBs_io));
             FillChar(OB_io^, SizeOf(TIOBOD)*(OBs_io), 0);
             read_OBs_io(pathDATA+_fnNDB_I+firExt, OB_io, 0,OBs_io,_err)
           end;

       { Teraz sa prekontroluju body, pretoze s vynimkou letisk
         a vojenskych bodov nesmu by ziadne body navyse, pretoze potom dochadza
         ku chybam pri dekodovani trati.
         Az potom sa mozu donacitavat ostatne body, t.j. letiska a vojenske.
       }
        {$IFDEF FPL4_ACT}
         if is_ParamStr(psNDB_RTE)<>'' then
           for i:= 0 to OB^.pocet-1 do
             begin
               OB^.read(i,bod);
               if (bod.kod='') or (bod.typ in [sym_CLet,sym_MLet,sym_ALet,sym_NONE,sym_SECTOR]) then continue;
               j:= 0; while (j<RTEs) and (_RTEbod_ind(bod.kod, RTE^[j])=-1) do inc(j);
               if j>=RTEs then MessError('Point '+bod.kod+' does''nt belong to any route.',true,_err)
             end;
        {$ENDIF}
       {$ENDIF}


      { ˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙
         vojenske trate
        ˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙
      }
       {$IFDEF FPL0}
        RTEs_m := get_items_RTE (pathDATA+strpas(fnRTE_M.fn),0 ,maxRTEs,_err);
        if RTEs_m<>0 then
          begin
            GetMem(RTE_m, SizeOf(TRTE)*(RTEs_m));
            FillChar(RTE_m^, SizeOf(TRTE)*(RTEs_m),0);
            read_RTEs(pathDATA+strpas(fnRTE_M.fn), RTE_m,0,RTEs_m, true,true);
          end;
       {$ENDIF}


      { ==============================
         nacitanie priestorov
        ------------------------------
      } _1    := get_items_AREA (pathDATA+strpas(fnR.fn),   pos_AREA_bodc,[odd_AREA_item], 0, maxAREAs, true,_err);
        bodov := get_items_AREA (pathDATA+strpas(fnTSA.fn), pos_AREA_bodc,[odd_AREA_item], _1,maxAREAs, true,_err);
        AREA  := New(PaArea,Init(bodov,sizeof(TpAREA),true));

        bres:=    (Exists(pathDATA+strpas(fnAREA.fn))<>0)
               or (_GetFTime(pathDATA+strpas(fnAREA.fn))<_GetFTime(pathDATA+strpas(fnR.fn)))
               or (_GetFTime(pathDATA+strpas(fnAREA.fn))<_GetFTime(pathDATA+strpas(fnTSA.fn)));
        if bres then DelFile(pathDATA+strpas(fnAREA.fn));
        ResetIOError;

        read_AREA (pathDATA+strpas(fnR.fn),   pos_AREA_bodc,[odd_AREA_item], AREA,0,_1,    true,bodov<>0,bres);
        read_AREA (pathDATA+strpas(fnTSA.fn), pos_AREA_bodc,[odd_AREA_item], AREA,_1,bodov,true,bodov<>0,bres);


      { ==============================
        nastavenie pracovnych suborov
        ------------------------------
      }
       {$IFDEF FLI_COORDINATION}
        if _GetFTime(pathLST+strpas(fnFLI.fn))<>_GetFTime(pathLST+strpas(fnNDB_I.fn)) then
           begin
             assign(f,pathLST+strpas(fnFLI.fn)); rewrite(f);
             for i:= 0 to OBs_io-1 do
                if strpos(OB_io^[i].pozn,info_FLI)<>nil then
                   begin
                     writeln(f,OB_io^[i].kod)
                   end;
             close(f);
           end;
       {$ENDIF}

       ResetIOError
     end;

 procedure BODY_init;
     var   _err: bool;
     begin
       _err:= false;
       write('Reading FIR description... '); {Reading *'+firExt+'... ');}
       {$IFDEF FDP}
         airbase:= read_this_airbase;
         {$IFDEF AIRBASE}
          if airbase='' then RunError(kbNL+'There is not configured the airbase code.');
         {$ENDIF}
        BODY_init_(_err);
       {$ENDIF}
       is_bod:= is_OB;
       if _err then writeln;
       writeln('Done.')
     end;

