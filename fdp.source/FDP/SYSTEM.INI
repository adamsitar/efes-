  NET SEND WAIT        =     ; delay po odoslani spravy do NET
  NET TEST TIMEOUT     = 40  ; test ma stranicu SLAVE po 40 sec
  NET ACK TIMEOUT      = 10  ; cakanie na potvrdenie
  NET ACK ALL          = yes ; implictne

  NET HEARTBEAT              ;  -//- NET
  IPX HEARTBEAT              ; testovanie stavu IPX v protokole IPX0 (BRIDGE OPL)

  NET BUFFERS
  IPX BUFFERS
  RTR BUFFERS

  DAR ARCHIVE          = enabled;
  DAR BUFFERS                ; 30< <300

  IPX_GLOBAL_INIT      = OFF

  IPX REPEAT                 ; opakovanie vyslania spravy v protokole IPX0, ak nebola potvrdena IPX-om

  NET IS INITIALIZED    = OFF ; hlasenie o tom...

  NODE FILTER             = OFF ; povolenie prijimat len od stanic uvedenych v USERs.cfg
  NODE INITIALIZE         = ON  ; je uzol inicializovany po prihlaseni sa ?
  NODE INITIALIZE WAIT    = OFF ; pri inicializacii caka na potvrdenie od uzla, kym vysle dalsiu spravu
  NODE INITIALIZE ALL     = ON  ; FDP uzol sa inicializuje vsetkymi, i uz potvrdenymi datami


