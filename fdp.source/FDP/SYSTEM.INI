;-----------------------
; FDP OPTIONS
;˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙

; REQ limit                  ; limit na vyziadanie pripomienky k letu (OPL)
; DEP limit                  ; limit na vydanie spravy o strate       (OPL)

  edit FPLM            = yes ; povolenie editacie vojenskeho a ineho stripu
  edit FPLC            = yes ; povolenie editacie civilneho stripu


  FPLO                 = yes ; odlisenie inych vojenskych planov
  FPLO-9               = yes ;   - podla letiska statu/pristatia
  FPLO-AP              = yes ;   - podla typu

  FPLM-AREA            = LZ  ; nazov mapy urcujucej hranice oblasti pre lety vojenskych lietadiel


  estimate ARR         = yes ; prepocet casu pristatia prijateho civilneho stripu,
                             ; ak to je vo FIR;
                             ; plati pre server pri prijme od externej linky
                             ; a pracovne stanice pri podani stripu
  search in FPLC archive     ; kolko archivivanych hodin sa prehladava v archive na EDD ?

  RDP INIT DB          = no  ; inicializacia RDP i datami zo suborov - kontrola na odmazane...

  target refresh             ; interval obnovenia pozicii cielov
  radius map ZAM             ; polomer vykreslenych map



;---------------------------------------------------------------
; nastavenie systemovych premennych, implicitna hodnota je v []
;˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙˙

  dir.tmp   =                ; docasny narodny adresar
  win.tmp   =                ; adresar pre ukladanie okien (RAM disk)
  win-mem   = no             ; ukladat okna do pamate [NO]

  mouse ver = 6.0            ; ak (starsia) verzia drivera

  menu scroll by mouse = no  ; pohybuje mys riadkom menu ?
  menu palette = 1           ; >0 podsvieteny riadok menu

  time      = 3              ; povolena tolerancia casu (sec)
  font8x8   = rus8x8.FNT     ; subor s fontom pre BGI grafiku, max. 20 znakov

  common archiv = no         ; spolocny subor pre vsetky I/O pkt


