[dosbox]
machine = svga_s3
memsize = 16

[cpu]
core = auto
cputype = pentium
cycles = max

[render]
scaler = normal2x
aspect = true

[sdl]
output = opengl
fullscreen = false
windowresolution = 1280x960
autolock = true
# Unbinds Ctrl+F9 "kill emulator" - it collides with Borland's Run key
# (pressing it froze the session on a hidden quit-confirm prompt).
mapperfile = dosbox-x.map

[dos]
xms = true
ems = true
umb = true

[autoexec]
@echo off
mount C "fdp.demo/idd"
mount D "BP7/installed"
mount E "fdp.source"
mount L "fdp.source/FDP/LIB"
SET PATH=D:\;%PATH%
C:
echo.
echo LETVIS FDP - EFES Environment
echo ==============================
echo   C: = Demo (run OPL.BAT / EDD.BAT)
echo   D: = Borland Pascal 7.0 (BPC, TD, BP)
echo   E: = Source code
echo   L: = Shared LIB sources (used by build + TD)
echo.
