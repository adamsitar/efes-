[dosbox]
machine = svga_s3
memsize = 16

[cpu]
core = auto
cputype = pentium
cycles = max

[render]
scaler = normal2x
aspect = true

[sdl]
output = opengl
fullscreen = false
windowresolution = 1280x960
autolock = true

[dos]
xms = true
ems = true
umb = true

[autoexec]
@echo off
mount C "fdp.demo/idd"
mount D "BP7/installed"
mount E "fdp.source"
SET PATH=D:\;%PATH%
C:
echo.
echo LETVIS FDP - EFES Environment
echo ==============================
echo   C: = Demo (run OPL.BAT / EDD.BAT)
echo   D: = Borland Pascal 7.0 (BPC, TD, BP)
echo   E: = Source code
echo.
